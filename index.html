<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/hvv-tw/vt-clan/main/vy.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VN CLAN × TY CLAN | rivals戰對</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            height: 100%;
            overflow: hidden;
            background-color: #020204;
            color: #fff;
            perspective: 1200px;
        }

        body {
            cursor: none;
        }
        a, .split, .btn {
            cursor: none !important;
        }

        /* 基礎滑鼠樣式與過渡動畫 */
        #custom-cursor {
            width: 8px;
            height: 8px;
            background: #ff7300;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px #ff7300, 0 0 20px #ffaa00;
            will-change: transform;
            transition: background 0.3s, box-shadow 0.3s;
        }

        #custom-cursor-blur {
            width: 32px;
            height: 32px;
            border: 1.5px solid rgba(255, 115, 0, 0.5);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%);
            transition: transform 0.08s cubic-bezier(0.25, 1, 0.5, 1), width 0.2s, height 0.2s, border-color 0.3s, background 0.3s;
            background: rgba(255, 115, 0, 0.03);
            will-change: transform;
        }

        /* 點擊時的縮放縮放特效 */
        body.cursor-clicking #custom-cursor {
            transform: translate(-50%, -50%) scale(0.7);
        }
        body.cursor-clicking #custom-cursor-blur {
            transform: translate(-50%, -50%) scale(1.6);
        }

        /* 進入 VN CLAN 分頁時的游標顏色 */
        body:has(.vn-side:hover) #custom-cursor {
            background: #00f2fe;
            box-shadow: 0 0 10px #00f2fe, 0 0 20px #4facfe;
        }
        body:has(.vn-side:hover) #custom-cursor-blur {
            border-color: rgba(0, 242, 254, 0.6);
            background: rgba(0, 242, 254, 0.08);
        }
        body.cursor-clicking:has(.vn-side:hover) #custom-cursor-blur {
            background: rgba(0, 242, 254, 0.2);
        }

        /* 進入 TY CLAN 分頁時的游標顏色 */
        body:has(.ty-side:hover) #custom-cursor {
            background: #ffe259;
            box-shadow: 0 0 10px #ffe259, 0 0 20px #ffa751;
        }
        body:has(.ty-side:hover) #custom-cursor-blur {
            border-color: rgba(255, 226, 89, 0.5);
            background: rgba(255, 226, 89, 0.06);
        }
        body.cursor-clicking:has(.ty-side:hover) #custom-cursor-blur {
            background: rgba(255, 226, 89, 0.15);
        }

        /* 進入 中間區塊（合作中）時的彩虹霓虹流光特效 */
        body:has(.middle-gap:hover) #custom-cursor {
            animation: rainbow-dot 1.5s linear infinite;
        }
        body:has(.middle-gap:hover) #custom-cursor-blur {
            animation: rainbow-blur 1.5s linear infinite;
            background: rgba(255, 255, 255, 0.03);
        }

        @keyframes rainbow-dot {
            0% { background: #ff0055; box-shadow: 0 0 10px #ff0055, 0 0 20px #ff0055; }
            20% { background: #00f2fe; box-shadow: 0 0 10px #00f2fe, 0 0 20px #00f2fe; }
            40% { background: #00ff66; box-shadow: 0 0 10px #00ff66, 0 0 20px #00ff66; }
            60% { background: #ffe259; box-shadow: 0 0 10px #ffe259, 0 0 20px #ffe259; }
            80% { background: #ff00ff; box-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff; }
            100% { background: #ff0055; box-shadow: 0 0 10px #ff0055, 0 0 20px #ff0055; }
        }
        @keyframes rainbow-blur {
            0% { border-color: rgba(255, 0, 85, 0.6); }
            20% { border-color: rgba(0, 242, 254, 0.6); }
            40% { border-color: rgba(0, 255, 102, 0.6); }
            60% { border-color: rgba(255, 226, 89, 0.6); }
            80% { border-color: rgba(255, 0, 255, 0.6); }
            100% { border-color: rgba(255, 0, 85, 0.6); }
        }

        .container {
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }

        .split {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
            transition: flex-grow 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), filter 0.4s ease;
            overflow: hidden;
            z-index: 1;
            will-change: flex-grow, filter;
        }

        .split::before {
            content: '';
            position: absolute;
            top: -10%; left: -10%; width: 120%; height: 120%;
            opacity: 0.06;
            pointer-events: none;
            transition: opacity 0.5s ease, transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            will-change: transform, opacity;
        }

        .split::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            z-index: 2;
            left: var(--x, 50%);
            top: var(--y, 50%);
            transform: translate(-50%, -50%);
            will-change: left, top, opacity;
        }

        .split:hover {
            flex-grow: 1.5;
        }
        
        .container:has(.split:hover) .split:not(:hover) {
            flex-grow: 0.7;
            filter: blur(6px) brightness(0.2) grayscale(0.7);
        }

        .vn-side {
            background: linear-gradient(135deg, #040612 0%, #010102 100%);
        }
        .vn-side::before {
            background-image: linear-gradient(rgba(0, 242, 254, 0.12) 1.5px, transparent 1.5px),
                              linear-gradient(90deg, rgba(0, 242, 254, 0.12) 1.5px, transparent 1.5px);
            background-size: 60px 60px;
        }
        .vn-side::after {
            background: radial-gradient(circle, rgba(0, 242, 254, 0.25) 0%, transparent 70%);
        }
        .vn-side:hover::before {
            opacity: 0.22;
            transform: scale(1.05) translate(var(--bg-x, 0px), var(--bg-y, 0px));
        }
        .vn-side:hover::after {
            opacity: 1;
        }

        .ty-side {
            background: linear-gradient(135deg, #0e0b07 0%, #010101 100%);
        }
        .ty-side::before {
            background: repeating-linear-gradient(45deg, rgba(212, 175, 55, 0.04), rgba(212, 175, 55, 0.04) 15px, transparent 15px, transparent 30px);
        }
        .ty-side::after {
            background: radial-gradient(circle, rgba(212, 175, 55, 0.18) 0%, transparent 70%);
        }
        .ty-side:hover::before {
            opacity: 0.15;
            transform: scale(1.05) rotate(1deg) translate(var(--bg-x, 0px), var(--bg-y, 0px));
        }
        .ty-side:hover::after {
            opacity: 1;
        }

        .middle-gap {
            width: 85px;
            background: #050507;
            border-left: 1px solid rgba(0, 242, 254, 0.25);
            border-right: 1px solid rgba(212, 175, 55, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
            box-shadow: 0 0 50px rgba(0,0,0,0.95);
            overflow: hidden;
        }

        .middle-gap::before {
            content: '';
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(to bottom, transparent, rgba(0, 242, 254, 0.2), rgba(212, 175, 55, 0.2), transparent);
            animation: scanline 3s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes scanline {
            0% { top: -100%; }
            100% { top: 200%; }
        }
        
        .coop-text {
            writing-mode: vertical-lr;
            text-orientation: upright;
            font-size: 1.75rem;
            font-weight: 900;
            letter-spacing: 16px;
            background: linear-gradient(180deg, #00f2fe 0%, #ffe259 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            animation: pulseGlow 1.8s ease-in-out infinite alternate;
            will-change: transform, filter;
        }

        @keyframes pulseGlow {
            0% { filter: drop-shadow(0 0 4px rgba(0, 242, 254, 0.5)) drop-shadow(0 0 8px rgba(212, 175, 55, 0.4)); transform: scale(0.97); }
            100% { filter: drop-shadow(0 0 16px rgba(0, 242, 254, 0.8)) drop-shadow(0 0 16px rgba(212, 175, 55, 0.7)); transform: scale(1.03); }
        }

        .container:has(.split:hover) .coop-text {
            filter: drop-shadow(0 0 25px #00f2fe);
            transform: scale(1.1) rotate(-3deg);
        }
        .container:has(.ty-side:hover) .coop-text {
            filter: drop-shadow(0 0 25px #ffe259);
            transform: scale(1.1) rotate(3deg);
        }

        .card {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 36px;
            padding: 55px 45px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), border-color 0.4s, box-shadow 0.4s;
            position: relative;
            z-index: 5;
            will-change: transform;
        }

        .card > * {
            transform: translateZ(30px);
        }

        .vn-side .card {
            border: 1px solid rgba(0, 242, 254, 0.08);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7);
        }
        .vn-side:hover .card {
            border-color: rgba(0, 242, 254, 0.7);
            box-shadow: 0 40px 80px rgba(0, 242, 254, 0.3), inset 0 0 30px rgba(0, 242, 254, 0.15);
        }

        .ty-side .card {
            border: 1px solid rgba(212, 175, 55, 0.06);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7);
        }
        .ty-side:hover .card {
            border-color: rgba(212, 175, 55, 0.65);
            box-shadow: 0 40px 80px rgba(212, 175, 55, 0.22), inset 0 0 30px rgba(212, 175, 55, 0.08);
        }

        .logo-text {
            font-size: 4.2rem;
            font-weight: 900;
            letter-spacing: 4px;
            margin-bottom: 5px;
            text-transform: uppercase;
            transform: translateZ(60px) scale(1);
            transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            white-space: nowrap;
        }
        .split:hover .logo-text {
            transform: translateZ(80px) scale(1.05);
        }
        
        .vn-text {
            background: linear-gradient(45deg, #00f2fe, #4facfe, #00f2fe);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineText 2.5s linear infinite;
        }
        .ty-text {
            background: linear-gradient(45deg, #ffe259, #ffa751, #ffe259);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineText 2.5s linear infinite;
        }

        @keyframes shineText {
            to { background-position: 200% center; }
        }

        .sub-title {
            font-size: 1.05rem;
            font-weight: 800;
            letter-spacing: 7px;
            text-transform: uppercase;
            margin-bottom: 30px;
            position: relative;
            display: inline-block;
            transform: translateZ(40px);
        }
        
        .sub-title::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            width: 0;
            height: 2px;
            transform: translateX(-50%);
            transition: width 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .vn-side:hover .sub-title::after { width: 90%; background: #00f2fe; box-shadow: 0 0 8px #00f2fe; }
        .ty-side:hover .sub-title::after { width: 90%; background: #ffe259; box-shadow: 0 0 8px #ffe259; }

        .vn-side .sub-title { color: rgba(0, 242, 254, 0.85); text-shadow: 0 0 10px rgba(0,242,254,0.3); }
        .ty-side .sub-title { color: rgba(212, 175, 55, 0.85); text-shadow: 0 0 10px rgba(212,175,55,0.3); }

        .desc {
            font-size: 1rem;
            line-height: 1.75;
            color: #b0b0b8;
            margin-bottom: 35px;
            transform: translateZ(35px);
            transition: color 0.3s ease;
        }
        .split:hover .desc {
            color: #fff;
        }

        .difficulty-box {
            border-radius: 24px;
            padding: 15px 28px;
            font-size: 1.15rem;
            font-weight: 800;
            letter-spacing: 4px;
            margin-bottom: 35px;
            display: inline-block;
            width: 100%;
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            overflow: hidden;
            transform: translateZ(45px);
        }

        .difficulty-box::before {
            content: '';
            position: absolute;
            top: 0; left: -150%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
        }
        .split:hover .difficulty-box::before {
            left: 150%;
            transition: left 1s ease;
        }

        .vn-box {
            background: rgba(0, 242, 254, 0.01);
            border: 1px dashed rgba(0, 242, 254, 0.3);
            color: #00f2fe;
            text-shadow: 0 0 8px rgba(0,242,254,0.3);
        }
        .vn-side:hover .vn-box {
            background: rgba(0, 242, 254, 0.1);
            border: 1px solid #00f2fe;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.35), inset 0 0 15px rgba(0, 242, 254, 0.15);
            transform: scale(1.03) translateZ(55px);
        }

        .ty-box {
            background: rgba(212, 175, 55, 0.01);
            border: 1px dashed rgba(212, 175, 55, 0.25);
            color: #ffe259;
            text-shadow: 0 0 8px rgba(212,175,55,0.3);
        }
        .ty-side:hover .ty-box {
            background: rgba(212, 175, 55, 0.08);
            border: 1px solid #ffe259;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3), inset 0 0 15px rgba(212, 175, 55, 0.1);
            transform: scale(1.03) translateZ(55px);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 16px 32px;
            font-size: 1.05rem;
            font-weight: 800;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2);
            width: 100%;
            letter-spacing: 3px;
            transform: translateZ(50px);
        }

        .btn-vn {
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            color: #010103;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.25);
        }
        .btn-vn:hover {
            transform: translateY(-6px) scale(1.03) translateZ(75px);
            box-shadow: 0 20px 35px rgba(0, 242, 254, 0.55), 0 0 15px rgba(0, 242, 254, 0.3);
        }

        .btn-ty {
            background: transparent;
            color: #ffe259;
            border: 2px solid #ffe259;
        }
        .btn-ty:hover {
            background: linear-gradient(45deg, #ffe259, #ffa751);
            color: #010102;
            transform: translateY(-6px) scale(1.03) translateZ(75px);
            box-shadow: 0 20px 35px rgba(212, 175, 55, 0.45), 0 0 15px rgba(212, 175, 55, 0.25);
            border-color: transparent;
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <div id="custom-cursor-blur"></div>

    <div class="container">
        
        <div class="split vn-side" id="vnSide">
            <div class="card">
                <div class="logo-text vn-text">VN CLAN</div>
                <div class="sub-title">EST 2026</div>
                <p class="desc">
                    不錯的戰對。適合給喜歡有挑戰性的Rivals玩家。每個成員都品行優良。
                </p>
                <div class="difficulty-box vn-box">考核難度：比較難考</div>
                <a href="https://discord.gg/UNRVAcKmD3" target="_blank" class="btn btn-vn" id="vnBtn">
                    進入 DISCORD 伺服器
                </a>
            </div>
        </div>

        <div class="middle-gap" id="middleGap">
            <div class="coop-text">合作中</div>
        </div>

        <div class="split ty-side" id="tySide">
            <div class="card">
                <div class="logo-text ty-text">TY CLAN</div>
                <div class="sub-title">EST 2026</div>
                <p class="desc">
                    很棒的戰對。適合給想要考戰對可是又找不到好的戰對的Rivals玩家。每個成員都品行優良。
                </p>
                <div class="difficulty-box ty-box">考核難度：比較簡單</div>
                <a href="https://discord.gg/uVADKfqsWM" target="_blank" class="btn btn-ty" id="tyBtn">
                    進入 DISCORD 伺服器
                </a>
            </div>
        </div>

    </div>

    <script>
        const cursor = document.getElementById('custom-cursor');
        const cursorBlur = document.getElementById('custom-cursor-blur');
        const vnSide = document.getElementById('vnSide');
        const tySide = document.getElementById('tySide');
        const middleGap = document.getElementById('middleGap');
        
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let cursorX = mouseX;
        let cursorY = mouseY;
        let currentHash = ''; // 用來記錄與檢查當前的網址狀態

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            updateUrlHash(); // 每次滑鼠移動時檢查位置並更新網址
        });

        window.addEventListener('mousedown', () => document.body.classList.add('cursor-clicking'));
        window.addEventListener('mouseup', () => document.body.classList.remove('cursor-clicking'));

        function updateVisuals() {
            cursor.style.transform = `translate3d(${mouseX}px, ${mouseY}px, 0) translate(-50%, -50%)`;
            
            cursorX += (mouseX - cursorX) * 0.25;
            cursorY += (mouseY - cursorY) * 0.25;
            cursorBlur.style.transform = `translate3d(${cursorX}px, ${cursorY}px, 0) translate(-50%, -50%)`;

            handleSideEffects(vnSide);
            handleSideEffects(tySide);

            requestAnimationFrame(updateVisuals);
        }

        // 動態檢查滑鼠座標落點，並用 replaceState 優雅地修改網址 Hash
        function updateUrlHash() {
            const vnRect = vnSide.getBoundingClientRect();
            const tyRect = tySide.getBoundingClientRect();
            const midRect = middleGap.getBoundingClientRect();

            if (mouseX >= vnRect.left && mouseX <= vnRect.right && mouseY >= vnRect.top && mouseY <= vnRect.bottom) {
                if (currentHash !== '#VN-CLAN') {
                    history.replaceState(null, '', '#VN-CLAN');
                    currentHash = '#VN-CLAN';
                }
            } else if (mouseX >= tyRect.left && mouseX <= tyRect.right && mouseY >= tyRect.top && mouseY <= tyRect.bottom) {
                if (currentHash !== '#TY-CLAN') {
                    history.replaceState(null, '', '#TY-CLAN');
                    currentHash = '#TY-CLAN';
                }
            } else {
                // 如果在中間或是移出網頁，把 Hash 清除還原
                if (currentHash !== '') {
                    history.replaceState(null, '', window.location.pathname);
                    currentHash = '';
                }
            }
        }

        function handleSideEffects(side) {
            const rect = side.getBoundingClientRect();
            if (mouseX >= rect.left && mouseX <= rect.right && mouseY >= rect.top && mouseY <= rect.bottom) {
                const x = mouseX - rect.left;
                const y = mouseY - rect.top;
                
                side.style.setProperty('--x', `${x}px`);
                side.style.setProperty('--y', `${y}px`);
                
                const bgX = (x - rect.width / 2) * 0.04;
                const bgY = (y - rect.height / 2) * 0.04;
                side.style.setProperty('--bg-x', `${bgX}px`);
                side.style.setProperty('--bg-y', `${bgY}px`);

                const card = side.querySelector('.card');
                if (card) {
                    const cardRect = card.getBoundingClientRect();
                    const cardCenterX = cardRect.left + cardRect.width / 2;
                    const cardCenterY = cardRect.top + cardRect.height / 2;
                    const rotateX = -(mouseY - cardCenterY) / (cardRect.height / 2) * 12;
                    const rotateY = (mouseX - cardCenterX) / (cardRect.width / 2) * 12;
                    
                    card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-5px)`;
                }
            } else {
                const card = side.querySelector('.card');
                if (card && card.style.transform !== '') {
                    card.style.transform = '';
                }
            }
        }

        requestAnimationFrame(updateVisuals);

        document.getElementById('vnBtn').addEventListener('click', (e) => e.stopPropagation());
        document.getElementById('tyBtn').addEventListener('click', (e) => e.stopPropagation());

        document.addEventListener('mouseleave', () => {
            cursor.style.opacity = '0';
            cursorBlur.style.opacity = '0';
            // 滑鼠移出網頁時同時還原網址
            if (currentHash !== '') {
                history.replaceState(null, '', window.location.pathname);
                currentHash = '';
            }
        });
        document.addEventListener('mouseenter', () => {
            cursor.style.opacity = '1';
            cursorBlur.style.opacity = '1';
        });
    </script>
</body>
</html>
