<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/hvv-tw/vt-clan/main/vy.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VN CLAN × TY CLAN | rivals戰對</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            height: 100%;
            overflow: hidden;
            background-color: #020204;
            color: #fff;
            perspective: 1200px;
        }

        body {
            cursor: none;
            position: relative;
        }
        a, .split, .btn {
            cursor: none !important;
        }

        #custom-cursor {
            width: 8px;
            height: 8px;
            background: #ff7300;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px #ff7300, 0 0 20px #ffaa00;
            will-change: transform;
            transition: background 0.3s, box-shadow 0.3s;
        }

        #custom-cursor-blur {
            width: 32px;
            height: 32px;
            border: 1.5px solid rgba(255, 115, 0, 0.5);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%);
            transition: transform 0.08s cubic-bezier(0.25, 1, 0.5, 1), width 0.2s, height 0.2s, border-color 0.3s, background 0.3s;
            background: rgba(255, 115, 0, 0.03);
            will-change: transform;
        }

        body.cursor-clicking #custom-cursor {
            transform: translate(-50%, -50%) scale(0.7);
        }
        body.cursor-clicking #custom-cursor-blur {
            transform: translate(-50%, -50%) scale(1.6);
        }

        body:has(.vn-side:hover) #custom-cursor {
            background: #00f2fe;
            box-shadow: 0 0 10px #00f2fe, 0 0 20px #4facfe;
        }
        body:has(.vn-side:hover) #custom-cursor-blur {
            border-color: rgba(0, 242, 254, 0.6);
            background: rgba(0, 242, 254, 0.08);
        }
        body.cursor-clicking:has(.vn-side:hover) #custom-cursor-blur {
            background: rgba(0, 242, 254, 0.2);
        }

        body:has(.ty-side:hover) #custom-cursor {
            background: #ffe259;
            box-shadow: 0 0 10px #ffe259, 0 0 20px #ffa751;
        }
        body:has(.ty-side:hover) #custom-cursor-blur {
            border-color: rgba(255, 226, 89, 0.5);
            background: rgba(255, 226, 89, 0.06);
        }
        body.cursor-clicking:has(.ty-side:hover) #custom-cursor-blur {
            background: rgba(255, 226, 89, 0.15);
        }

        body:has(.middle-gap:hover) #custom-cursor {
            animation: rainbow-dot 1.5s linear infinite;
        }
        body:has(.middle-gap:hover) #custom-cursor-blur {
            animation: rainbow-blur 1.5s linear infinite;
            background: rgba(255, 255, 255, 0.03);
        }

        @keyframes rainbow-dot {
            0% { background: #ff0055; box-shadow: 0 0 10px #ff0055, 0 0 20px #ff0055; }
            20% { background: #00f2fe; box-shadow: 0 0 10px #00f2fe, 0 0 20px #00f2fe; }
            40% { background: #00ff66; box-shadow: 0 0 10px #00ff66, 0 0 20px #00ff66; }
            60% { background: #ffe259; box-shadow: 0 0 10px #ffe259, 0 0 20px #ffe259; }
            80% { background: #ff00ff; box-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff; }
            100% { background: #ff0055; box-shadow: 0 0 10px #ff0055, 0 0 20px #ff0055; }
        }
        @keyframes rainbow-blur {
            0% { border-color: rgba(255, 0, 85, 0.6); }
            20% { border-color: rgba(0, 242, 254, 0.6); }
            40% { border-color: rgba(0, 255, 102, 0.6); }
            60% { border-color: rgba(255, 226, 89, 0.6); }
            80% { border-color: rgba(255, 0, 255, 0.6); }
            100% { border-color: rgba(255, 0, 85, 0.6); }
        }

        .click-burst-p {
            position: fixed;
            pointer-events: none;
            border-radius: 50%;
            z-index: 10001;
            will-change: transform, opacity;
            animation: burstAnim 0.5s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }

        @keyframes burstAnim {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0); opacity: 0; }
        }

        .container {
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
            will-change: transform;
        }

        .container.shake {
            animation: screenShake 0.35s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes screenShake {
            10%, 90% { transform: translate3d(-2px, -1px, 0); }
            20%, 80% { transform: translate3d(3px, 1px, 0); }
            30%, 50%, 70% { transform: translate3d(-5px, -2px, 0); }
            40%, 60% { transform: translate3d(5px, 2px, 0); }
        }

        #impact-flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 10000;
            opacity: 0;
        }
        #impact-flash.flash-vn { animation: flashBlue 0.45s ease-out; }
        #impact-flash.flash-ty { animation: flashGold 0.45s ease-out; }

        @keyframes flashBlue {
            0% { opacity: 0.4; background: #00f2fe; filter: blur(15px); }
            100% { opacity: 0; background: transparent; }
        }
        @keyframes flashGold {
            0% { opacity: 0.35; background: #ffe259; filter: blur(15px); }
            100% { opacity: 0; background: transparent; }
        }

        .split {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
            transition: flex-grow 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), filter 0.4s ease;
            overflow: hidden;
            z-index: 1;
            will-change: flex-grow, filter;
        }

        .split::before {
            content: '';
            position: absolute;
            top: -10%; left: -10%; width: 120%; height: 120%;
            opacity: 0.06;
            pointer-events: none;
            transition: opacity 0.5s ease, transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            will-change: transform, opacity;
            z-index: 1;
        }

        .particles-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .split::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            z-index: 3;
            left: var(--x, 50%);
            top: var(--y, 50%);
            transform: translate(-50%, -50%);
            will-change: left, top, opacity;
        }

        .split:hover {
            flex-grow: 1.5;
        }
        
        .container:has(.split:hover) .split:not(:hover) {
            flex-grow: 0.7;
            filter: blur(6px) brightness(0.2) grayscale(0.7);
        }

        .vn-side {
            background: linear-gradient(135deg, #040612 0%, #010102 100%);
        }
        .vn-side::before {
            background-image: linear-gradient(rgba(0, 242, 254, 0.12) 1.5px, transparent 1.5px),
                              linear-gradient(90deg, rgba(0, 242, 254, 0.12) 1.5px, transparent 1.5px);
            background-size: 60px 60px;
        }
        .vn-side::after {
            background: radial-gradient(circle, rgba(0, 242, 254, 0.25) 0%, transparent 70%);
        }
        .vn-side:hover::before {
            opacity: 0.22;
            transform: scale(1.05) translate(var(--bg-x, 0px), var(--bg-y, 0px));
        }
        .vn-side:hover::after {
            opacity: 1;
        }

        .ty-side {
            background: linear-gradient(135deg, #0e0b07 0%, #010101 100%);
        }
        .ty-side::before {
            background: repeating-linear-gradient(45deg, rgba(212, 175, 55, 0.04), rgba(212, 175, 55, 0.04) 15px, transparent 15px, transparent 30px);
        }
        .ty-side::after {
            background: radial-gradient(circle, rgba(212, 175, 55, 0.18) 0%, transparent 70%);
        }
        .ty-side:hover::before {
            opacity: 0.15;
            transform: scale(1.05) rotate(1deg) translate(var(--bg-x, 0px), var(--bg-y, 0px));
        }
        .ty-side:hover::after {
            opacity: 1;
        }

        .middle-gap {
            width: 85px;
            background: #050507;
            border-left: 1px solid rgba(0, 242, 254, 0.25);
            border-right: 1px solid rgba(212, 175, 55, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
            box-shadow: 0 0 50px rgba(0,0,0,0.95);
            overflow: hidden;
        }

        .middle-gap::before {
            content: '';
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(to bottom, transparent, rgba(0, 242, 254, 0.2), rgba(212, 175, 55, 0.2), transparent);
            animation: scanline 3s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes scanline {
            0% { top: -100%; }
            100% { top: 200%; }
        }
        
        .coop-text {
            writing-mode: vertical-lr;
            text-orientation: upright;
            font-size: 1.75rem;
            font-weight: 900;
            letter-spacing: 16px;
            background: linear-gradient(180deg, #00f2fe 0%, #ffe259 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            animation: pulseGlow 1.8s ease-in-out infinite alternate;
            will-change: transform, filter;
        }

        @keyframes pulseGlow {
            0% { filter: drop-shadow(0 0 4px rgba(0, 242, 254, 0.5)) drop-shadow(0 0 8px rgba(212, 175, 55, 0.4)); transform: scale(0.97); }
            100% { filter: drop-shadow(0 0 16px rgba(0, 242, 254, 0.8)) drop-shadow(0 0 16px rgba(212, 175, 55, 0.7)); transform: scale(1.03); }
        }

        .container:has(.split:hover) .coop-text {
            filter: drop-shadow(0 0 25px #00f2fe);
            transform: scale(1.1) rotate(-3deg);
        }
        .container:has(.ty-side:hover) .coop-text {
            filter: drop-shadow(0 0 25px #ffe259);
            transform: scale(1.1) rotate(3deg);
        }

        .card {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 36px;
            padding: 55px 45px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), border-color 0.4s, box-shadow 0.4s;
            position: relative;
            z-index: 5;
            overflow: hidden;
            will-change: transform;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 36px;
            background: radial-gradient(circle at var(--gloss-x, 50%) var(--gloss-y, 50%), rgba(255, 255, 255, 0.08) 0%, transparent 55%);
            pointer-events: none;
            z-index: 6;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card::after {
            content: '';
            position: absolute;
            left: 0;
            width: 100%;
            height: 12px;
            pointer-events: none;
            z-index: 4;
            opacity: 0;
        }

        .vn-side:hover .card::before {
            opacity: 1;
            background: radial-gradient(circle at var(--gloss-x, 50%) var(--gloss-y, 50%), rgba(0, 242, 254, 0.15) 0%, transparent 60%);
        }
        .ty-side:hover .card::before {
            opacity: 1;
            background: radial-gradient(circle at var(--gloss-x, 50%) var(--gloss-y, 50%), rgba(255, 226, 89, 0.12) 0%, transparent 60%);
        }

        .vn-side:hover .card::after {
            background: linear-gradient(to bottom, transparent, rgba(0, 242, 254, 0.25), transparent);
            animation: cardRadarScan 2.2s linear infinite;
        }
        .ty-side:hover .card::after {
            background: linear-gradient(to bottom, transparent, rgba(255, 226, 89, 0.2), transparent);
            animation: cardRadarScan 2.2s linear infinite;
        }

        @keyframes cardRadarScan {
            0% { top: -20%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 120%; opacity: 0; }
        }

        .card > * {
            transform: translateZ(30px);
        }

        .vn-side .card {
            border: 1px solid rgba(0, 242, 254, 0.08);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7);
        }
        .vn-side:hover .card {
            border-color: rgba(0, 242, 254, 0.7);
            box-shadow: 0 40px 80px rgba(0, 242, 254, 0.3), inset 0 0 30px rgba(0, 242, 254, 0.15);
        }

        .ty-side .card {
            border: 1px solid rgba(212, 175, 55, 0.06);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7);
        }
        .ty-side:hover .card {
            border-color: rgba(212, 175, 55, 0.65);
            box-shadow: 0 40px 80px rgba(212, 175, 55, 0.22), inset 0 0 30px rgba(212, 175, 55, 0.08);
        }

        .logo-text {
            font-size: 4.2rem;
            font-weight: 900;
            letter-spacing: 4px;
            margin-bottom: 5px;
            text-transform: uppercase;
            transform: translateZ(60px) scale(1);
            transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            white-space: nowrap;
        }
        .split:hover .logo-text {
            transform: translateZ(80px) scale(1.05);
        }
        
        .vn-side:hover .vn-text {
            animation: shineText 2.5s linear infinite, glitchText 0.3s linear;
        }
        .ty-side:hover .ty-text {
            animation: shineText 2.5s linear infinite, glitchText 0.3s linear;
        }

        @keyframes glitchText {
            0% { transform: translateZ(80px) scale(1.05) skewX(0deg); text-shadow: 2px -1px 0 #ffe259, -2px 1px 0 #00f2fe; }
            20% { transform: translateZ(80px) scale(1.07) skewX(-3deg); text-shadow: -3px 2px 0 #ffe259, 3px -2px 0 #00f2fe; }
            40% { transform: translateZ(80px) scale(1.03) skewX(2deg); text-shadow: 1px -2px 0 #ffe259, -1px 2px 0 #00f2fe; }
            60% { transform: translateZ(80px) scale(1.05) skewX(-1deg); text-shadow: -1px 1px 0 #ffe259, 2px -1px 0 #00f2fe; }
            80% { transform: translateZ(80px) scale(1.04) skewX(0deg); text-shadow: 2px 1px 0 #ffe259, -2px -1px 0 #00f2fe; }
            100% { transform: translateZ(80px) scale(1.05) skewX(0deg); text-shadow: none; }
        }

        .vn-text {
            background: linear-gradient(45deg, #00f2fe, #4facfe, #00f2fe);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineText 2.5s linear infinite;
        }
        .ty-text {
            background: linear-gradient(45deg, #ffe259, #ffa751, #ffe259);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineText 2.5s linear infinite;
        }

        @keyframes shineText {
            to { background-position: 200% center; }
        }

        .sub-title {
            font-size: 1.05rem;
            font-weight: 800;
            letter-spacing: 7px;
            text-transform: uppercase;
            margin-bottom: 30px;
            position: relative;
            display: inline-block;
            transform: translateZ(40px);
        }
        
        .sub-title::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            width: 0;
            height: 2px;
            transform: translateX(-50%);
            transition: width 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .vn-side:hover .sub-title::after { width: 90%; background: #00f2fe; box-shadow: 0 0 8px #00f2fe; }
        .ty-side:hover .sub-title::after { width: 90%; background: #ffe259; box-shadow: 0 0 8px #ffe259; }

        .vn-side .sub-title { color: rgba(0, 242, 254, 0.85); text-shadow: 0 0 10px rgba(0,242,254,0.3); }
        .ty-side .sub-title { color: rgba(212, 175, 55, 0.85); text-shadow: 0 0 10px rgba(212,175,55,0.3); }

        .desc {
            font-size: 1rem;
            line-height: 1.75;
            color: #b0b0b8;
            margin-bottom: 35px;
            transform: translateZ(35px);
            transition: color 0.3s ease;
        }
        .split:hover .desc {
            color: #fff;
        }

        .difficulty-box {
            border-radius: 24px;
            padding: 15px 28px;
            font-size: 1.15rem;
            font-weight: 800;
            letter-spacing: 4px;
            margin-bottom: 35px;
            display: inline-block;
            width: 100%;
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            overflow: hidden;
            transform: translateZ(45px);
        }

        .difficulty-box::before {
            content: '';
            position: absolute;
            top: 0; left: -150%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
        }
        .split:hover .difficulty-box::before {
            left: 150%;
            transition: left 1s ease;
        }

        .vn-box {
            background: rgba(0, 242, 254, 0.01);
            border: 1px dashed rgba(0, 242, 254, 0.3);
            color: #00f2fe;
            text-shadow: 0 0 8px rgba(0,242,254,0.3);
        }
        .vn-side:hover .vn-box {
            background: rgba(0, 242, 254, 0.1);
            border: 1px solid #00f2fe;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.35), inset 0 0 15px rgba(0, 242, 254, 0.15);
            transform: scale(1.03) translateZ(55px);
        }

        .ty-box {
            background: rgba(212, 175, 55, 0.01);
            border: 1px dashed rgba(212, 175, 55, 0.25);
            color: #ffe259;
            text-shadow: 0 0 8px rgba(212,175,55,0.3);
        }
        .ty-side:hover .ty-box {
            background: rgba(212, 175, 55, 0.08);
            border: 1px solid #ffe259;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3), inset 0 0 15px rgba(212, 175, 55, 0.1);
            transform: scale(1.03) translateZ(55px);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 16px 32px;
            font-size: 1.05rem;
            font-weight: 800;
            text-decoration: none;
            border-radius: 50px;
            width: 100%;
            letter-spacing: 3px;
            translate: var(--mag-x, 0px) var(--mag-y, 0px);
            transform: translateZ(50px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2), background 0.4s, color 0.4s, box-shadow 0.4s, border-color 0.4s;
            will-change: translate, transform;
        }

        .btn-vn {
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            color: #010103;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.25);
        }
        .btn-vn:hover {
            transform: translateY(-6px) scale(1.03) translateZ(75px);
            box-shadow: 0 20px 35px rgba(0, 242, 254, 0.55), 0 0 15px rgba(0, 242, 254, 0.3);
        }

        .btn-ty {
            background: transparent;
            color: #ffe259;
            border: 2px solid #ffe259;
        }
        .btn-ty:hover {
            background: linear-gradient(45deg, #ffe259, #ffa751);
            color: #010102;
            transform: translateY(-6px) scale(1.03) translateZ(75px);
            box-shadow: 0 20px 35px rgba(212, 175, 55, 0.45), 0 0 15px rgba(212, 175, 55, 0.25);
            border-color: transparent;
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <div id="custom-cursor-blur"></div>
    <div id="impact-flash"></div>

    <div class="container" id="mainContainer">
        
        <div class="split vn-side" id="vnSide">
            <canvas id="vnCanvas" class="particles-canvas"></canvas>
            <div class="card">
                <div class="logo-text vn-text">VN CLAN</div>
                <div class="sub-title">EST 2026</div>
                <p class="desc">
                    不錯的戰對。適合給喜歡有挑戰性的Rivals玩家。每個成員都品行優良。
                </p>
                <div class="difficulty-box vn-box">考核難度：比較難考</div>
                <a href="https://discord.gg/UNRVAcKmD3" target="_blank" class="btn btn-vn" id="vnBtn">
                    進入 DISCORD 伺服器
                </a>
            </div>
        </div>

        <div class="middle-gap" id="middleGap">
            <div class="coop-text">合作中</div>
        </div>

        <div class="split ty-side" id="tySide">
            <canvas id="tyCanvas" class="particles-canvas"></canvas>
            <div class="card">
                <div class="logo-text ty-text">TY CLAN</div>
                <div class="sub-title">EST 2026</div>
                <p class="desc">
                    很棒的戰對。適合給想要考戰對可是又找不到好的戰對的Rivals玩家。每個成員都品行優良。
                </p>
                <div class="difficulty-box ty-box">考核難度：比較簡單</div>
                <a href="https://discord.gg/uVADKfqsWM" target="_blank" class="btn btn-ty" id="tyBtn">
                    進入 DISCORD 伺服器
                </a>
            </div>
        </div>

    </div>

    <script>
        const cursor = document.getElementById('custom-cursor');
        const cursorBlur = document.getElementById('custom-cursor-blur');
        const vnSide = document.getElementById('vnSide');
        const tySide = document.getElementById('tySide');
        const middleGap = document.getElementById('middleGap');
        const mainContainer = document.getElementById('mainContainer');
        const flashOverlay = document.getElementById('impact-flash');
        const vnCanvas = document.getElementById('vnCanvas');
        const tyCanvas = document.getElementById('tyCanvas');
        const vnBtn = document.getElementById('vnBtn');
        const tyBtn = document.getElementById('tyBtn');
        
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let cursorX = mouseX;
        let cursorY = mouseY;
        let currentHash = '';

        let vnBtnMag = { cx: 0, cy: 0, tx: 0, ty: 0 };
        let tyBtnMag = { cx: 0, cy: 0, tx: 0, ty: 0 };

        const vnCtx = vnCanvas.getContext('2d');
        const tyCtx = tyCanvas.getContext('2d');
        let vnParticles = [];
        let tyParticles = [];

        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSynthSound(type) {
            try {
                initAudio();
                if (!audioCtx) return;
                
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                if (type === 'hover') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(1320, audioCtx.currentTime + 0.06);
                    gainNode.gain.setValueAtTime(0.015, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.06);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.06);
                } else if (type === 'click') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(160, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.12);
                    gainNode.gain.setValueAtTime(0.18, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.12);
                } else if (type === 'switch') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(220, audioCtx.currentTime);
                    osc.frequency.linearRampToValueAtTime(80, audioCtx.currentTime + 0.25);
                    gainNode.gain.setValueAtTime(0.06, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.25);
                }
            } catch (e) {}
        }

        function resizeCanvases() {
            vnCanvas.width = vnSide.offsetWidth;
            vnCanvas.height = vnSide.offsetHeight;
            tyCanvas.width = tySide.offsetWidth;
            tyCanvas.height = tySide.offsetHeight;
        }

        function createParticle(sideType) {
            const w = sideType === 'vn' ? vnCanvas.width : tyCanvas.width;
            const h = sideType === 'vn' ? vnCanvas.height : tyCanvas.height;
            return {
                x: Math.random() * w,
                y: h + Math.random() * 30,
                vx: (Math.random() - 0.5) * 0.4,
                vy: -(Math.random() * 0.8 + 0.4),
                size: sideType === 'vn' ? Math.random() * 5 + 2 : Math.random() * 3.5 + 1.5,
                opacity: Math.random() * 0.4 + 0.15,
                maxLife: Math.random() * 250 + 150,
                life: 0
            };
        }

        function initParticles() {
            resizeCanvases();
            for (let i = 0; i < 35; i++) {
                let pVn = createParticle('vn');
                pVn.y = Math.random() * vnCanvas.height;
                vnParticles.push(pVn);

                let pTy = createParticle('ty');
                pTy.y = Math.random() * tyCanvas.height;
                tyParticles.push(pTy);
            }
        }

        function drawParticles(ctx, canvas, list, sideType) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const rect = canvas.getBoundingClientRect();
            const mX = mouseX - rect.left;
            const mY = mouseY - rect.top;

            for (let i = 0; i < list.length; i++) {
                let p = list[i];
                
                let dx = p.x - mX;
                let dy = p.y - mY;
                let dist = Math.hypot(dx, dy);
                let pushX = 0;
                let pushY = 0;

                if (dist < 120 && mouseX >= rect.left && mouseX <= rect.right) {
                    let force = (120 - dist) / 120;
                    pushX = (dx / dist) * force * 1.8;
                    pushY = (dy / dist) * force * 1.8;
                }

                p.x += p.vx + pushX;
                p.y += p.vy + pushY;
                p.life++;

                if (p.y < -10 || p.life > p.maxLife || p.x < -10 || p.x > canvas.width + 10) {
                    list[i] = createParticle(sideType);
                    p = list[i];
                }

                ctx.fillStyle = sideType === 'vn' ? `rgba(0, 242, 254, ${p.opacity})` : `rgba(255, 226, 89, ${p.opacity})`;
                ctx.beginPath();
                if (sideType === 'vn') {
                    ctx.fillRect(p.x, p.y, p.size, p.size);
                } else {
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        const scrambleChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*+?";
        function triggerScramble(el) {
            if (!el) return;
            const targetText = el.getAttribute('data-origin') || el.innerText;
            if (!el.getAttribute('data-origin')) {
                el.setAttribute('data-origin', targetText);
            }
            let currentIteration = 0;
            clearInterval(el.scrambleTimer);
            el.scrambleTimer = setInterval(() => {
                el.innerText = targetText.split("").map((char, idx) => {
                    if (char === " " || char === "：" || char === "X") return char;
                    if (idx < currentIteration) return targetText[idx];
                    return scrambleChars[Math.floor(Math.random() * scrambleChars.length)];
                }).join("");
                if (currentIteration >= targetText.length) {
                    clearInterval(el.scrambleTimer);
                }
                currentIteration += targetText.length / 12;
            }, 30);
        }

        function calculateMagnetic(btn, data) {
            const rect = btn.getBoundingClientRect();
            const bx = rect.left + rect.width / 2;
            const by = rect.top + rect.height / 2;
            const dist = Math.hypot(mouseX - bx, mouseY - by);
            if (dist < 130) {
                data.tx = (mouseX - bx) * 0.38;
                data.ty = (mouseY - by) * 0.38;
            } else {
                data.tx = 0;
                data.ty = 0;
            }
            data.cx += (data.tx - data.cx) * 0.12;
            data.cy += (data.ty - data.cy) * 0.12;
            btn.style.setProperty('--mag-x', `${data.cx}px`);
            btn.style.setProperty('--mag-y', `${data.cy}px`);
        }

        function triggerFlashAndShake(side) {
            flashOverlay.className = '';
            void flashOverlay.offsetWidth;
            flashOverlay.classList.add(side === 'vn' ? 'flash-vn' : 'flash-ty');

            mainContainer.classList.remove('shake');
            void mainContainer.offsetWidth;
            mainContainer.classList.add('shake');
            setTimeout(() => mainContainer.classList.remove('shake'), 350);
            playSynthSound('switch');
        }

        function createClickBurst(x, y) {
            let color = '#ff7300';
            let shadow = '#ffaa00';
            let isRainbow = false;

            if (currentHash === '#VN-CLAN') {
                color = '#00f2fe';
                shadow = '#4facfe';
            } else if (currentHash === '#TY-CLAN') {
                color = '#ffe259';
                shadow = '#ffa751';
            } else {
                const rect = middleGap.getBoundingClientRect();
                if (x >= rect.left && x <= rect.right) {
                    isRainbow = true;
                }
            }

            const count = 12;
            const rainbowColors = ['#ff0055', '#00f2fe', '#00ff66', '#ffe259', '#ff00ff'];

            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.classList.add('click-burst-p');
                
                const size = Math.random() * 6 + 4;
                p.style.width = `${size}px`;
                p.style.height = `${size}px`;
                
                if (isRainbow) {
                    const rc = rainbowColors[Math.floor(Math.random() * rainbowColors.length)];
                    p.style.background = rc;
                    p.style.boxShadow = `0 0 8px ${rc}`;
                } else {
                    p.style.background = color;
                    p.style.boxShadow = `0 0 8px ${shadow}`;
                }

                p.style.left = `${x}px`;
                p.style.top = `${y}px`;

                const angle = (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
                const speed = Math.random() * 55 + 45;
                const dx = Math.cos(angle) * speed;
                const dy = Math.sin(angle) * speed;

                p.style.setProperty('--dx', `${dx}px`);
                p.style.setProperty('--dy', `${dy}px`);

                document.body.appendChild(p);
                p.addEventListener('animationend', () => p.remove());
            }
            playSynthSound('click');
        }

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            updateUrlHash();
        });

        window.addEventListener('click', (e) => {
            createClickBurst(e.clientX, e.clientY);
        });

        window.addEventListener('resize', resizeCanvases);
        window.addEventListener('mousedown', () => document.body.classList.add('cursor-clicking'));
        window.addEventListener('mouseup', () => document.body.classList.remove('cursor-clicking'));

        vnSide.addEventListener('mouseenter', () => {
            triggerScramble(vnSide.querySelector('.vn-text'));
            triggerScramble(vnSide.querySelector('.vn-box'));
            playSynthSound('hover');
        });
        tySide.addEventListener('mouseenter', () => {
            triggerScramble(tySide.querySelector('.ty-text'));
            triggerScramble(tySide.querySelector('.ty-box'));
            playSynthSound('hover');
        });

        function updateVisuals() {
            cursor.style.transform = `translate3d(${mouseX}px, ${mouseY}px, 0) translate(-50%, -50%)`;
            
            cursorX += (mouseX - cursorX) * 0.25;
            cursorY += (mouseY - cursorY) * 0.25;
            cursorBlur.style.transform = `translate3d(${cursorX}px, ${cursorY}px, 0) translate(-50%, -50%)`;

            calculateMagnetic(vnBtn, vnBtnMag);
            calculateMagnetic(tyBtn, tyBtnMag);

            drawParticles(vnCtx, vnCanvas, vnParticles, 'vn');
            drawParticles(tyCtx, tyCanvas, tyParticles, 'ty');

            handleSideEffects(vnSide);
            handleSideEffects(tySide);

            requestAnimationFrame(updateVisuals);
        }

        function updateUrlHash() {
            const vnRect = vnSide.getBoundingClientRect();
            const tyRect = tySide.getBoundingClientRect();

            if (mouseX >= vnRect.left && mouseX <= vnRect.right && mouseY >= vnRect.top && mouseY <= vnRect.bottom) {
                if (currentHash !== '#VN-CLAN') {
                    triggerFlashAndShake('vn');
                    history.replaceState(null, '', '#VN-CLAN');
                    currentHash = '#VN-CLAN';
                }
            } else if (mouseX >= tyRect.left && mouseX <= tyRect.right && mouseY >= tyRect.top && mouseY <= tyRect.bottom) {
                if (currentHash !== '#TY-CLAN') {
                    triggerFlashAndShake('ty');
                    history.replaceState(null, '', '#TY-CLAN');
                    currentHash = '#TY-CLAN';
                }
            } else {
                if (currentHash !== '') {
                    history.replaceState(null, '', window.location.pathname);
                    currentHash = '';
                }
            }
        }

        function handleSideEffects(side) {
            const rect = side.getBoundingClientRect();
            if (mouseX >= rect.left && mouseX <= rect.right && mouseY >= rect.top && mouseY <= rect.bottom) {
                const x = mouseX - rect.left;
                const y = mouseY - rect.top;
                
                side.style.setProperty('--x', `${x}px`);
                side.style.setProperty('--y', `${y}px`);
                
                const bgX = (x - rect.width / 2) * 0.04;
                const bgY = (y - rect.height / 2) * 0.04;
                side.style.setProperty('--bg-x', `${bgX}px`);
                side.style.setProperty('--bg-y', `${bgY}px`);

                const card = side.querySelector('.card');
                if (card) {
                    const cardRect = card.getBoundingClientRect();
                    const cardCenterX = cardRect.left + cardRect.width / 2;
                    const cardCenterY = cardRect.top + cardRect.height / 2;
                    const rotateX = -(mouseY - cardCenterY) / (cardRect.height / 2) * 12;
                    const rotateY = (mouseX - cardCenterX) / (cardRect.width / 2) * 12;
                    
                    card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-5px)`;

                    const clX = mouseX - cardRect.left;
                    const clY = mouseY - cardRect.top;
                    card.style.setProperty('--gloss-x', `${clX}px`);
                    card.style.setProperty('--gloss-y', `${clY}px`);
                }
            } else {
                const card = side.querySelector('.card');
                if (card && card.style.transform !== '') {
                    card.style.transform = '';
                }
            }
        }

        initParticles();
        requestAnimationFrame(updateVisuals);

        vnBtn.addEventListener('click', (e) => e.stopPropagation());
        tyBtn.addEventListener('click', (e) => e.stopPropagation());

        document.addEventListener('mouseleave', () => {
            cursor.style.opacity = '0';
            cursorBlur.style.opacity = '0';
            if (currentHash !== '') {
                history.replaceState(null, '', window.location.pathname);
                currentHash = '';
            }
        });
        document.addEventListener('mouseenter', () => {
            cursor.style.opacity = '1';
            cursorBlur.style.opacity = '1';
        });
    </script>
</body>
</html>
