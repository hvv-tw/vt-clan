<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VN CLAN × TY CLAN | rivals戰對</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            height: 100%;
            overflow: hidden;
            background-color: #030303;
            color: #fff;
        }

        .container {
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }

        .split {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
            transition: flex 0.6s cubic-bezier(0.25, 1, 0.5, 1), filter 0.5s ease;
            cursor: pointer;
            overflow: hidden;
            z-index: 1;
        }

        .split::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.12;
            pointer-events: none;
            transition: opacity 0.5s ease, transform 0.6s ease;
        }

        .split:hover {
            flex: 1.4;
        }
        .container:has(.split:hover) .split:not(:hover) {
            flex: 0.8;
            filter: blur(3px) brightness(0.3);
        }

        .vn-side {
            background: linear-gradient(135deg, #070913 0%, #020205 100%);
        }
        .vn-side::before {
            background-image: linear-gradient(rgba(0, 242, 254, 0.1) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 242, 254, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .vn-side:hover::before {
            opacity: 0.25;
            transform: scale(1.05);
        }

        .ty-side {
            background: linear-gradient(135deg, #120f0a 0%, #040302 100%);
        }
        .ty-side::before {
            background: repeating-linear-gradient(45deg, rgba(212, 175, 55, 0.04), rgba(212, 175, 55, 0.04) 12px, transparent 12px, transparent 24px);
        }
        .ty-side:hover::before {
            opacity: 0.2;
            transform: scale(1.05);
        }

        .middle-gap {
            width: 80px;
            background: #0a0a0a;
            border-left: 1px solid rgba(0, 242, 254, 0.15);
            border-right: 1px solid rgba(212, 175, 55, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        
        .coop-text {
            writing-mode: vertical-lr;
            text-orientation: upright;
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: 12px;
            background: linear-gradient(180deg, #00f2fe, #ffe259);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(0, 242, 254, 0.3), 0 0 15px rgba(212, 175, 55, 0.3);
            transition: all 0.5s ease;
            animation: rainbowGlow 3s ease-in-out infinite alternate;
        }

        @keyframes rainbowGlow {
            0% {
                filter: drop-shadow(0 0 8px rgba(0, 242, 254, 0.6));
            }
            100% {
                filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.6));
            }
        }

        .container:has(.vn-side:hover) .coop-text {
            filter: drop-shadow(0 0 20px rgba(0, 242, 254, 0.9));
            transform: scale(1.05);
        }
        .container:has(.ty-side:hover) .coop-text {
            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.9));
            transform: scale(1.05);
        }

        .card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 28px;
            padding: 45px 35px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            transform: translateY(15px);
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
        }

        .vn-side .card {
            border: 1px solid rgba(0, 242, 254, 0.15);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }
        .vn-side:hover .card {
            border-color: rgba(0, 242, 254, 0.5);
            box-shadow: 0 30px 60px rgba(0, 242, 254, 0.15);
            transform: translateY(0);
        }

        .ty-side .card {
            border: 1px solid rgba(212, 175, 55, 0.12);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }
        .ty-side:hover .card {
            border-color: rgba(212, 175, 55, 0.45);
            box-shadow: 0 30px 60px rgba(212, 175, 55, 0.1);
            transform: translateY(0);
        }

        .logo-text {
            font-size: 4.5rem;
            font-weight: 900;
            letter-spacing: 4px;
            margin-bottom: 2px;
            text-transform: uppercase;
        }
        .vn-text {
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .ty-text {
            background: linear-gradient(45deg, #ffe259, #ffa751);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-title {
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 25px;
        }
        .vn-side .sub-title { color: rgba(0, 242, 254, 0.8); }
        .ty-side .sub-title { color: rgba(212, 175, 55, 0.8); }

        .desc {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #b5b5b5;
            margin-bottom: 30px;
        }

        .difficulty-box {
            border-radius: 16px;
            padding: 12px 20px;
            font-size: 1.05rem;
            font-weight: 800;
            letter-spacing: 3px;
            margin-bottom: 35px;
            display: inline-block;
            width: 100%;
            transition: all 0.4s ease;
        }

        .vn-box {
            background: rgba(0, 242, 254, 0.03);
            border: 1px dashed rgba(0, 242, 254, 0.3);
            color: #00f2fe;
            box-shadow: inset 0 0 15px rgba(0, 242, 254, 0.05);
        }
        .vn-side:hover .vn-box {
            background: rgba(0, 242, 254, 0.08);
            border: 1px solid rgba(0, 242, 254, 0.8);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.2), inset 0 0 15px rgba(0, 242, 254, 0.1);
            transform: scale(1.02);
        }

        .ty-box {
            background: rgba(212, 175, 55, 0.02);
            border: 1px dashed rgba(212, 175, 55, 0.25);
            color: #ffe259;
            box-shadow: inset 0 0 15px rgba(212, 175, 55, 0.02);
        }
        .ty-side:hover .ty-box {
            background: rgba(212, 175, 55, 0.06);
            border: 1px solid rgba(212, 175, 55, 0.7);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.15), inset 0 0 15px rgba(212, 175, 55, 0.08);
            transform: scale(1.02);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: 700;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 100%;
            letter-spacing: 2px;
        }

        .btn-vn {
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            color: #020205;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }
        .btn-vn:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 25px rgba(0, 242, 254, 0.5);
        }

        .btn-ty {
            background: transparent;
            color: #ffe259;
            border: 2px solid #ffe259;
        }
        .btn-ty:hover {
            background: linear-gradient(45deg, #ffe259, #ffa751);
            color: #040302;
            transform: translateY(-4px);
            box-shadow: 0 12px 25px rgba(212, 175, 55, 0.4);
            border-color: transparent;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="split vn-side" onclick="window.open('https://discord.gg/UNRVAcKmD3', '_blank')">
            <div class="card">
                <div class="logo-text vn-text">VN</div>
                <div class="sub-title">EST 2026</div>
                <p class="desc">
                    不錯的戰對。適合給喜歡有挑戰性的Rivals玩家。每個成員都品行優良。
                </p>
                <div class="difficulty-box vn-box">考核難度：比較難考</div>
                <a href="https://discord.gg/UNRVAcKmD3" target="_blank" class="btn btn-vn" onclick="event.stopPropagation();">
                    進入 DISCORD 伺服器
                </a>
            </div>
        </div>

        <div class="middle-gap">
            <div class="coop-text">合作中</div>
        </div>

        <div class="split ty-side" onclick="window.open('https://discord.gg/uVADKfqsWM', '_blank')">
            <div class="card">
                <div class="logo-text ty-text">TY</div>
                <div class="sub-title">EST 2026</div>
                <p class="desc">
                    很棒的戰對。適合給想要考戰對可是又找不到好的戰對的Rivals玩家。每個成員都品行優良。
                </p>
                <div class="difficulty-box ty-box">考核難度：比較簡單</div>
                <a href="https://discord.gg/uVADKfqsWM" target="_blank" class="btn btn-ty" onclick="event.stopPropagation();">
                    進入 DISCORD 伺服器
                </a>
            </div>
        </div>

    </div>

</body>
</html>
