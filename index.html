<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VN CLAN × TY CLAN | rivals戰對</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            height: 100%;
            overflow: hidden;
            background-color: #020204;
            color: #fff;
            perspective: 1000px;
        }

        .container {
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }

        .split {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
            transition: flex 0.8s cubic-bezier(0.16, 1, 0.3, 1), filter 0.6s ease;
            cursor: pointer;
            overflow: hidden;
            z-index: 1;
        }

        .split::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.08;
            pointer-events: none;
            transition: opacity 0.6s ease, transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), background-position 0s;
        }

        .split::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease, transform 0.1s ease;
            z-index: 2;
        }

        .split:hover {
            flex: 1.6;
        }
        
        .container:has(.split:hover) .split:not(:hover) {
            flex: 0.6;
            filter: blur(5px) brightness(0.25) grayscale(0.5);
        }

        .vn-side {
            background: linear-gradient(135deg, #050714 0%, #010103 100%);
        }
        .vn-side::before {
            background-image: linear-gradient(rgba(0, 242, 254, 0.15) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 242, 254, 0.15) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        .vn-side::after {
            background: rgba(0, 242, 254, 0.2);
            left: var(--x, 50%);
            top: var(--y, 50%);
            transform: translate(-50%, -50%);
        }
        .vn-side:hover::before {
            opacity: 0.25;
            transform: scale(1.08);
            animation: gridMove 20px linear infinite;
            animation-duration: 2s;
        }
        .vn-side:hover::after {
            opacity: 1;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 40px 40px; }
        }

        .ty-side {
            background: linear-gradient(135deg, #0f0d09 0%, #020202 100%);
        }
        .ty-side::before {
            background: repeating-linear-gradient(45deg, rgba(212, 175, 55, 0.05), rgba(212, 175, 55, 0.05) 15px, transparent 15px, transparent 30px);
        }
        .ty-side::after {
            background: rgba(212, 175, 55, 0.15);
            left: var(--x, 50%);
            top: var(--y, 50%);
            transform: translate(-50%, -50%);
        }
        .ty-side:hover::before {
            opacity: 0.18;
            transform: scale(1.08) rotate(2deg);
        }
        .ty-side:hover::after {
            opacity: 1;
        }

        .middle-gap {
            width: 90px;
            background: #060608;
            border-left: 1px solid rgba(0, 242, 254, 0.2);
            border-right: 1px solid rgba(212, 175, 55, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
            box-shadow: 0 0 40px rgba(0,0,0,0.9);
            overflow: hidden;
        }

        .middle-gap::before {
            content: '';
            position: absolute;
            top: -50%;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.1), transparent);
            animation: scanline 4s linear infinite;
        }

        @keyframes scanline {
            0% { top: -50%; }
            100% { top: 150%; }
        }
        
        .coop-text {
            writing-mode: vertical-lr;
            text-orientation: upright;
            font-size: 1.7rem;
            font-weight: 900;
            letter-spacing: 15px;
            background: linear-gradient(180deg, #00f2fe 0%, #7bf2b9 40%, #fcd667 70%, #ffe259 100%);
            background-size: 100% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            animation: flowColors 4s ease-in-out infinite alternate, pulseGlow 2s ease-in-out infinite alternate;
        }

        @keyframes flowColors {
            0% { background-position: 0% 0%; }
            100% { background-position: 0% 100%; }
        }

        @keyframes pulseGlow {
            0% { filter: drop-shadow(0 0 5px rgba(0, 242, 254, 0.5)) drop-shadow(0 0 10px rgba(212, 175, 55, 0.3)); }
            100% { filter: drop-shadow(0 0 15px rgba(0, 242, 254, 0.7)) drop-shadow(0 0 20px rgba(212, 175, 55, 0.6)); transform: scale(0.98); }
        }

        .container:has(.vn-side:hover) .coop-text {
            filter: drop-shadow(0 0 25px #00f2fe);
            transform: scale(1.08) rotate(-2deg);
        }
        .container:has(.ty-side:hover) .coop-text {
            filter: drop-shadow(0 0 25px #ffe259);
            transform: scale(1.08) rotate(2deg);
        }

        .card {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 50px 40px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            transform: translateY(20px) rotateX(5px);
            transform-style: preserve-3d;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            z-index: 5;
        }

        .card > * {
            transform: translateZ(20px);
        }

        .vn-side .card {
            border: 1px solid rgba(0, 242, 254, 0.1);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(0, 242, 254, 0.02);
        }
        .vn-side:hover .card {
            border-color: rgba(0, 242, 254, 0.6);
            box-shadow: 0 40px 80px rgba(0, 242, 254, 0.25), inset 0 0 30px rgba(0, 242, 254, 0.1);
            transform: translateY(0) rotateX(0deg) scale(1.02);
        }

        .ty-side .card {
            border: 1px solid rgba(212, 175, 55, 0.08);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(212, 175, 55, 0.01);
        }
        .ty-side:hover .card {
            border-color: rgba(212, 175, 55, 0.55);
            box-shadow: 0 40px 80px rgba(212, 175, 55, 0.18), inset 0 0 30px rgba(212, 175, 55, 0.05);
            transform: translateY(0) rotateX(0deg) scale(1.02);
        }

        .logo-text {
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: 6px;
            margin-bottom: 2px;
            text-transform: uppercase;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .split:hover .logo-text {
            transform: translateZ(40px) scale(1.05);
        }
        
        .vn-text {
            background: linear-gradient(45deg, #00f2fe, #4facfe, #00f2fe);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineText 3s linear infinite;
        }
        .ty-text {
            background: linear-gradient(45deg, #ffe259, #ffa751, #ffe259);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineText 3s linear infinite;
        }

        @keyframes shineText {
            to { background-position: 200% center; }
        }

        .sub-title {
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 25px;
            position: relative;
            display: inline-block;
        }
        
        .sub-title::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            width: 0;
            height: 2px;
            transform: translateX(-50%);
            transition: width 0.4s ease;
        }
        .vn-side:hover .sub-title::after { width: 80%; background: #00f2fe; }
        .ty-side:hover .sub-title::after { width: 80%; background: #ffe259; }

        .vn-side .sub-title { color: rgba(0, 242, 254, 0.8); text-shadow: 0 0 10px rgba(0,242,254,0.2); }
        .ty-side .sub-title { color: rgba(212, 175, 55, 0.8); text-shadow: 0 0 10px rgba(212,175,55,0.2); }

        .desc {
            font-size: 0.98rem;
            line-height: 1.7;
            color: #bcbcbc;
            margin-bottom: 35px;
            transition: color 0.4s ease;
        }
        .split:hover .desc {
            color: #fff;
        }

        .difficulty-box {
            border-radius: 20px;
            padding: 14px 24px;
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 4px;
            margin-bottom: 35px;
            display: inline-block;
            width: 100%;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .difficulty-box::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: none;
        }
        .split:hover .difficulty-box::before {
            left: 100%;
            transition: left 0.8s ease;
        }

        .vn-box {
            background: rgba(0, 242, 254, 0.02);
            border: 1px dashed rgba(0, 242, 254, 0.25);
            color: #00f2fe;
        }
        .vn-side:hover .vn-box {
            background: rgba(0, 242, 254, 0.08);
            border: 1px solid #00f2fe;
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.3), inset 0 0 15px rgba(0, 242, 254, 0.1);
            transform: scale(1.03) translateZ(30px);
        }

        .ty-box {
            background: rgba(212, 175, 55, 0.01);
            border: 1px dashed rgba(212, 175, 55, 0.2);
            color: #ffe259;
        }
        .ty-side:hover .ty-box {
            background: rgba(212, 175, 55, 0.06);
            border: 1px solid #ffe259;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.25), inset 0 0 15px rgba(212, 175, 55, 0.05);
            transform: scale(1.03) translateZ(30px);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 16px 32px;
            font-size: 1.05rem;
            font-weight: 800;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 100%;
            letter-spacing: 3px;
            position: relative;
        }

        .btn-vn {
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            color: #010103;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }
        .btn-vn:hover {
            transform: translateY(-5px) scale(1.02) translateZ(50px);
            box-shadow: 0 15px 30px rgba(0, 242, 254, 0.5), 0 0 10px rgba(0, 242, 254, 0.3);
        }

        .btn-ty {
            background: transparent;
            color: #ffe259;
            border: 2px solid #ffe259;
        }
        .btn-ty:hover {
            background: linear-gradient(45deg, #ffe259, #ffa751);
            color: #020202;
            transform: translateY(-5px) scale(1.02) translateZ(50px);
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.4), 0 0 10px rgba(212, 175, 55, 0.2);
            border-color: transparent;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="split vn-side" id="vnSide">
            <div class="card">
                <div class="logo-text vn-text">VN</div>
                <div class="sub-title">EST 2026</div>
                <p class="desc">
                    不錯的戰對。適合給喜歡有挑戰性的Rivals玩家。每個成員都品行優良。
                </p>
                <div class="difficulty-box vn-box">考核難度：比較難考</div>
                <a href="https://discord.gg/UNRVAcKmD3" target="_blank" class="btn btn-vn" id="vnBtn">
                    進入 DISCORD 伺服器
                </a>
            </div>
        </div>

        <div class="middle-gap">
            <div class="coop-text">合作中</div>
        </div>

        <div class="split ty-side" id="tySide">
            <div class="card">
                <div class="logo-text ty-text">TY</div>
                <div class="sub-title">EST 2026</div>
                <p class="desc">
                    很棒的戰對。適合給想要考戰對可是又找不到好的戰對的Rivals玩家。每個成員都品行優良。
                </p>
                <div class="difficulty-box ty-box">考核難度：比較簡單</div>
                <a href="https://discord.gg/uVADKfqsWM" target="_blank" class="btn btn-ty" id="tyBtn">
                    進入 DISCORD 伺服器
                </a>
            </div>
        </div>

    </div>

    <script>
        const handleMove = (e, side) => {
            const rect = side.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            side.style.setProperty('--x', `${x}px`);
            side.style.setProperty('--y', `${y}px`);
        };

        const vnSide = document.getElementById('vnSide');
        const tySide = document.getElementById('tySide');

        vnSide.addEventListener('mousemove', (e) => handleMove(e, vnSide));
        tySide.addEventListener('mousemove', (e) => handleMove(e, tySide));

        vnSide.addEventListener('click', () => window.open('https://discord.gg/UNRVAcKmD3', '_blank'));
        tySide.addEventListener('click', () => window.open('https://discord.gg/uVADKfqsWM', '_blank'));

        document.getElementById('vnBtn').addEventListener('click', (e) => e.stopPropagation());
        document.getElementById('tyBtn').addEventListener('click', (e) => e.stopPropagation());
    </script>
</body>
</html>
